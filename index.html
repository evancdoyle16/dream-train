    function calcDrumBounds() {
        const ky   = sceneH;              // sequencer starts flush at scene bottom
        const areaH= H - ky - 6;
        const gridX= DRUM_BPM_W + DRUM_LABEL_W;
        const gridW= W - gridX - DRUM_CTRL_W - 8;

        // Match the grid height to the sound-tab active area (keys + chords + pivots)
        // so both tabs feel the same visual weight.
        const gridInsetTop = KEY_TOP_PAD;                                       // 22px — same top pad as keys
        const gridH = WHITE_KEY_H + CHORD_GAP + CHORD_BTN_H + PIVOT_GAP + PIVOT_BTN_H; // 262px
        const rowH  = Math.floor(gridH / 5);                                    // 52px per row
        const cellW = gridW / DRUM_STEPS;

        drumBounds.ky           = ky;
        drumBounds.areaH        = areaH;
        drumBounds.rowH         = rowH;
        drumBounds.gridInsetTop = gridInsetTop;
        drumBounds.gridH        = gridH;
        drumBounds.gridX        = gridX;
        drumBounds.gridW        = gridW;
        drumBounds.cellW        = cellW;

        // All side elements pin to the same top/bottom as the grid
        const gridTop = ky + gridInsetTop;
        const gridBot = gridTop + gridH;

        // BPM panel: ~68% of gridH; AUTO panel: remainder with gap
        const bpmPanelH  = Math.round(gridH * 0.68);
        const autoPanelY = gridTop + bpmPanelH + 6;
        const autoPanelH = gridBot - autoPanelY;

        // BPM sub-panel layout: vertically centre the full group within bpmPanelH
        // Group = label(20) + gap(10) + upBtn(28) + gap(14) + number(38) + gap(14) + downBtn(28) = 152
        const bpmGroupH  = 152;
        const bpmTopPad  = Math.round((bpmPanelH - bpmGroupH) / 2);
        const bpmLabelY  = gridTop + bpmTopPad + 10;          // label centre
        const bpmUpY     = gridTop + bpmTopPad + 20 + 10;     // up btn top
        const bpmNumCY   = gridTop + bpmTopPad + 20 + 10 + 28 + 14 + 19; // number centre
        const bpmDownY   = gridTop + bpmTopPad + 20 + 10 + 28 + 14 + 38 + 14; // down btn top
        drumBounds.bpmCY      = bpmNumCY;
        drumBounds.bpmLabelY  = bpmLabelY;
        drumBounds.bpmPanelH  = bpmPanelH;
        drumBounds.autoPanelY = autoPanelY;
        drumBounds.autoPanelH = autoPanelH;
        // Panels fill the full DRUM_BPM_W column (flush with label column border)
        drumBounds.bpmUp      = {x:4, y:bpmUpY,   w:DRUM_BPM_W-8, h:28};
        drumBounds.bpmDown    = {x:4, y:bpmDownY, w:DRUM_BPM_W-8, h:28};
        drumBounds.autoDrumBtn= {x:0, y:autoPanelY, w:DRUM_BPM_W-2, h:autoPanelH};

        // Right controls: pack play / label / knob / ott / sync as a tight group, centred in gridH
        const ctrlX      = W - DRUM_CTRL_W + 6;
        const ctrlBtnW   = DRUM_CTRL_W - 12;
        const playH      = 44;
        const knobR      = 30;
        const ottToggleH = 26;
        const syncH      = 34;
        const labelH     = 22;   // "SIDECHAIN" label between play and knob
        const grpGap     = 8;
        const ottGap     = 6;
        const grpH       = playH + grpGap + labelH + knobR*2 + ottGap + ottToggleH + ottGap + syncH;
        const grpTop     = gridTop + Math.round((gridH - grpH) / 2);

        const playY      = grpTop;
        const knobCY     = grpTop + playH + grpGap + labelH + knobR;
        const ottBtnY    = knobCY + knobR + ottGap;
        const syncY      = ottBtnY + ottToggleH + ottGap;

        drumBounds.playBtn  = {x:ctrlX, y:playY,   w:ctrlBtnW, h:playH};
        drumBounds.ottBtn   = {x:ctrlX, y:ottBtnY, w:ctrlBtnW, h:ottToggleH};
        drumBounds.syncBtn  = {x:ctrlX, y:syncY,   w:ctrlBtnW, h:syncH};
        drumBounds.scKnob   = {cx: ctrlX + ctrlBtnW/2, cy: knobCY, r: knobR};
        drumBounds.scLabelY = grpTop + playH + grpGap + labelH/2;

        // Individual grid cells — offset by gridInsetTop to match sound-tab proportions
        drumBounds.cells = [];
        for(let r=0;r<5;r++) {
            drumBounds.cells[r] = [];
            for(let s=0;s<DRUM_STEPS;s++) {
                drumBounds.cells[r][s] = {
                    x: gridX + s*cellW + 1,
                    y: ky + gridInsetTop + r*rowH + 2,
                    w: cellW - 2,
                    h: rowH  - 4
                };
            }
        }
    }

    function drawTabStrip() {
        // Large tabs floating just above the keyboard/sequencer panel
        const tabW = 120, tabH = 44;
        const tabX = 8, tabY = sceneH - tabH;

        // Left-side tabs: SOUND + RHYTHM
        const tabs = [['SOUND','sound'],['RHYTHM','rhythm']];
        tabs.forEach(([label,id],i) => {
            const tx = tabX + i*(tabW+4);
            const active = currentTab === id;
            ctx.fillStyle = active ? '#1e0a2e' : 'rgba(10,3,20,0.94)';
            rrect(tx, tabY, tabW, tabH, 8,8,0,0); ctx.fill();
            ctx.strokeStyle = active ? SW.magenta : 'rgba(139,0,32,0.4)';
            ctx.lineWidth = active ? 2 : 1;
            rrect(tx, tabY, tabW, tabH, 8,8,0,0); ctx.stroke();
            if(active) {
                // Full-width amber top accent — runs to within 3px of each corner
                ctx.strokeStyle = SW.amber; ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(tx+3, tabY+1.5); ctx.lineTo(tx+tabW-3, tabY+1.5); ctx.stroke();
            }
            ctx.fillStyle = active ? SW.amber : 'rgba(200,100,130,0.55)';
            ctx.font = `bold 18px ${FONT}`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(label, tx+tabW/2, tabY+tabH/2 + 1);
        });

        // Right-side "First Try" portal — amber/vintage styling, navigates to v1
        const ftW = 118, ftH = 44, ftX = W - ftW - 8;
        ctx.fillStyle = 'rgba(18,10,2,0.95)';
        rrect(ftX, tabY, ftW, ftH, 8,8,0,0); ctx.fill();
        ctx.strokeStyle = 'rgba(160,100,20,0.55)';
        ctx.lineWidth = 1.5;
        rrect(ftX, tabY, ftW, ftH, 8,8,0,0); ctx.stroke();
        // Warm top-edge accent line — full width to within 3px of corners
        ctx.strokeStyle = 'rgba(200,140,30,0.7)'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(ftX+3, tabY+1.5); ctx.lineTo(ftX+ftW-3, tabY+1.5); ctx.stroke();
        ctx.fillStyle = 'rgba(210,155,50,0.75)';
        ctx.font = `bold 13px ${FONT}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('◄ FIRST TRY', ftX + ftW/2, tabY + ftH/2 + 1);

    }

    function drawDrumSequencer() {
        if(!drumBounds.ky) calcDrumBounds();
        const {ky, areaH, rowH, gridInsetTop, gridH, gridX, gridW, cellW, cells,
               bpmPanelH, autoPanelY, autoPanelH, scLabelY, bpmLabelY} = drumBounds;
        const ctrlX  = W - DRUM_CTRL_W + 6;
        const ctrlW  = DRUM_CTRL_W - 12;
        const gridTop = ky + gridInsetTop;
        const gridBot = gridTop + gridH;

        // Background
        ctx.fillStyle = '#06020e';
        ctx.fillRect(0, ky, W, areaH + 8);
        drawKeyboardGrid(ky);
        ctx.strokeStyle = 'rgba(139,0,32,0.25)';
        ctx.lineWidth = 1;
        ctx.strokeRect(0, ky, W, areaH + 8);

        // ── BPM Panel (upper sub-panel) ────────────────────────────────────
        const bpmCY   = drumBounds.bpmCY;
        ctx.fillStyle = '#110622';
        rrect(0, gridTop, DRUM_BPM_W-2, bpmPanelH, 6,6,6,6); ctx.fill();
        ctx.strokeStyle = 'rgba(139,0,32,0.45)'; ctx.lineWidth=1.5;
        rrect(0, gridTop, DRUM_BPM_W-2, bpmPanelH, 6,6,6,6); ctx.stroke();

        ctx.fillStyle = 'rgba(220,120,140,0.7)';
        ctx.font = `14px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('BPM', DRUM_BPM_W/2, bpmLabelY);

        ctx.fillStyle = SW.amber;
        ctx.font = `bold 32px ${FONT}`;
        ctx.fillText(drumBPM, DRUM_BPM_W/2, bpmCY);

        // BPM up / down
        [drumBounds.bpmUp, drumBounds.bpmDown].forEach((b, i) => {
            ctx.fillStyle = '#200c34';
            rrect(b.x, b.y, b.w, b.h, 5,5,5,5); ctx.fill();
            ctx.strokeStyle = 'rgba(139,0,32,0.5)'; ctx.lineWidth=1.5;
            rrect(b.x, b.y, b.w, b.h, 5,5,5,5); ctx.stroke();
            ctx.fillStyle = SW.orange;
            ctx.font = `18px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(i===0?'▲':'▼', b.x+b.w/2, b.y+b.h/2);
        });

        // ── AUTO Panel (lower sub-panel) ───────────────────────────────────
        const adb = drumBounds.autoDrumBtn;
        if(adb) {
            const on = autoDrum;
            ctx.save();
            // Panel background — distinct from BPM panel
            ctx.fillStyle = on ? '#081a06' : '#060810';
            rrect(adb.x, adb.y, adb.w, adb.h, 6,6,6,6); ctx.fill();
            ctx.strokeStyle = on ? 'rgba(80,220,80,0.9)' : 'rgba(80,220,80,0.22)';
            ctx.lineWidth = on ? 2 : 1;
            rrect(adb.x, adb.y, adb.w, adb.h, 6,6,6,6); ctx.stroke();
            if(on) {
                ctx.globalCompositeOperation = 'screen';
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#40e040';
                rrect(adb.x+2, adb.y+2, adb.w-4, adb.h-4, 4,4,4,4); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
                ctx.globalAlpha = 1;
                const pulse = 0.5 + 0.5 * Math.sin(globalTime * 2.8);
                ctx.globalAlpha = 0.5 + pulse * 0.5;
                ctx.fillStyle = '#60ff60';
                ctx.beginPath();
                ctx.arc(adb.x + adb.w/2, adb.y + adb.h * 0.72, 3, 0, Math.PI*2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            ctx.fillStyle = on ? '#80ff80' : 'rgba(80,220,80,0.45)';
            ctx.font = `bold 13px ${FONT}`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('AUTO', adb.x + adb.w/2, adb.y + adb.h * 0.5);
            if(!on) {
                ctx.fillStyle = 'rgba(80,180,80,0.28)';
                ctx.font = `10px ${FONT}`;
                ctx.fillText('rhythm', adb.x + adb.w/2, adb.y + adb.h * 0.72);
            }
            ctx.restore();
        }

        // ── Row labels + grid ─────────────────────────────────────────────
        const ROW_COLORS = [SW.amber, SW.hotPink, SW.hotPink, SW.orange, SW.crimson];

        // Visual playhead: computed from AudioContext time so it stays in sync with audio
        // (drumStep is the scheduler counter which runs ahead by up to LOOKAHEAD ms)
        let drumVisualStep = -1;
        if(drumPlaying && audioCtx && drumStartTime > 0) {
            const elapsed = audioCtx.currentTime - drumStartTime;
            if(elapsed >= 0) {
                drumVisualStep = Math.floor(elapsed / drumStepDur()) % DRUM_STEPS;
            }
        }

        for(let r=0;r<5;r++) {
            // Row label
            ctx.fillStyle = ROW_COLORS[r] + 'cc';
            ctx.font = `bold 13px ${FONT}`; ctx.textAlign='right'; ctx.textBaseline='middle';
            ctx.fillText(DRUM_ROWS[r], DRUM_BPM_W + DRUM_LABEL_W - 6, ky + gridInsetTop + r*rowH + rowH/2);

            for(let s=0;s<DRUM_STEPS;s++) {
                const c = cells[r][s];
                const isActive  = drumPattern[r][s];
                const isCurrent = drumVisualStep === s;
                const isBeat    = s % 8 === 0;   // bar start — every 8 steps
                const isHalf    = s % 4 === 0;   // half-beat — every 4 steps
                const isQtr     = s % 2 === 0;   // quarter subdivision — every 2 steps

                // Cell background — 4 distinct brightness levels
                let bg = isBeat  ? '#280e48' :    // bar start: bright purple
                         isHalf  ? '#1e0a38' :    // half-beat: medium purple
                         isQtr   ? '#160828' :    // quarter sub: dark purple
                                   '#0e0420';     // 16th: almost black
                ctx.fillStyle = bg;
                rrect(c.x, c.y, c.w, c.h, 3,3,3,3); ctx.fill();

                if(isActive) {
                    ctx.fillStyle = ROW_COLORS[r];
                    ctx.globalAlpha = isCurrent ? 1.0 : 0.82;
                    rrect(c.x, c.y, c.w, c.h, 3,3,3,3); ctx.fill();
                    ctx.globalAlpha = 1;
                    // Active cell inner glow
                    ctx.fillStyle = 'rgba(255,255,255,0.12)';
                    rrect(c.x+2, c.y+2, c.w-4, Math.min(4, c.h*0.35), 2,2,0,0); ctx.fill();
                } else if(isCurrent) {
                    // Playhead highlight on empty cell
                    ctx.fillStyle = 'rgba(255,200,100,0.18)';
                    rrect(c.x, c.y, c.w, c.h, 3,3,3,3); ctx.fill();
                }

                // Cell border — beat starts get a brighter border
                if(isBeat) {
                    ctx.strokeStyle = 'rgba(200,80,120,0.5)';
                    ctx.lineWidth = 1;
                } else {
                    ctx.strokeStyle = isActive ? ROW_COLORS[r]+'88' : 'rgba(100,30,60,0.4)';
                    ctx.lineWidth = 0.5;
                }
                rrect(c.x, c.y, c.w, c.h, 3,3,3,3); ctx.stroke();
            }
        }

        // Bar lines (every 8 steps) — bright and thick, span only the grid area
        ctx.strokeStyle = 'rgba(255,80,60,0.55)'; ctx.lineWidth = 2;
        for(const b of [8, 16, 24]) {
            const bx = gridX + b * cellW;
            ctx.beginPath(); ctx.moveTo(bx, gridTop); ctx.lineTo(bx, gridBot); ctx.stroke();
        }
        // Half-beat lines (every 4 steps) — medium
        ctx.strokeStyle = 'rgba(180,60,80,0.3)'; ctx.lineWidth = 1;
        for(const b of [4, 12, 20, 28]) {
            const bx = gridX + b * cellW;
            ctx.beginPath(); ctx.moveTo(bx, gridTop); ctx.lineTo(bx, gridBot); ctx.stroke();
        }

        // ── Right control panel ───────────────────────────────────────────

        // Play / Pause button
        const pb = drumBounds.playBtn;
        ctx.fillStyle = drumPlaying ? '#220a38' : '#110622';
        rrect(pb.x, pb.y, pb.w, pb.h, 7,7,7,7); ctx.fill();
        ctx.strokeStyle = drumPlaying ? SW.magenta : 'rgba(139,0,32,0.5)';
        ctx.lineWidth = drumPlaying ? 2 : 1.5;
        rrect(pb.x, pb.y, pb.w, pb.h, 7,7,7,7); ctx.stroke();

        ctx.fillStyle = drumPlaying ? SW.amber : SW.orange;
        ctx.font = `bold 17px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(drumPlaying ? '❚❚ STOP' : '▶ PLAY', pb.x+pb.w/2, pb.y+pb.h/2);

        // Sidechain knob
        const sk = drumBounds.scKnob;
        const trackR = sk.r - 8;
        // Label (centred in the reserved label row between play btn and knob)
        ctx.fillStyle = 'rgba(220,120,140,0.7)';
        ctx.font = `bold 11px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('SIDECHAIN', sk.cx, scLabelY);
        // Outer glow ring
        ctx.save();
        ctx.shadowColor = SW.magenta; ctx.shadowBlur = sidechainAmt > 0.05 ? 14 : 0;
        ctx.beginPath(); ctx.arc(sk.cx, sk.cy, sk.r, 0, Math.PI*2);
        ctx.fillStyle = '#110622'; ctx.fill();
        ctx.strokeStyle = `rgba(139,0,32,${0.4 + sidechainAmt*0.5})`; ctx.lineWidth=2; ctx.stroke();
        ctx.restore();
        // Knob track arc
        const startA = Math.PI * 0.75, endA = Math.PI * 2.25;
        const valA   = startA + sidechainAmt * (endA - startA);
        ctx.beginPath(); ctx.arc(sk.cx, sk.cy, trackR, startA, endA);
        ctx.strokeStyle = 'rgba(100,30,60,0.55)'; ctx.lineWidth=5; ctx.stroke();
        ctx.beginPath(); ctx.arc(sk.cx, sk.cy, trackR, startA, valA);
        ctx.strokeStyle = SW.magenta; ctx.lineWidth=5; ctx.stroke();
        // Indicator dot
        ctx.beginPath(); ctx.arc(sk.cx + Math.cos(valA)*trackR, sk.cy + Math.sin(valA)*trackR, 5.5, 0, Math.PI*2);
        ctx.fillStyle = SW.amber; ctx.fill();
        // Value text
        ctx.fillStyle = SW.amber;
        ctx.font = `bold 14px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(Math.round(sidechainAmt*100)+'%', sk.cx, sk.cy);

        // OTT / NORMAL sidechain mode toggle
        const ob = drumBounds.ottBtn;
        if(ob) {
            ctx.fillStyle = ottMode ? '#2a0416' : '#0d0320';
            rrect(ob.x, ob.y, ob.w, ob.h, 5,5,5,5); ctx.fill();
            ctx.strokeStyle = ottMode ? SW.hotPink : 'rgba(139,0,32,0.45)';
            ctx.lineWidth = ottMode ? 2 : 1.5;
            rrect(ob.x, ob.y, ob.w, ob.h, 5,5,5,5); ctx.stroke();
            if(ottMode) {
                ctx.save();
                ctx.shadowColor = SW.hotPink; ctx.shadowBlur = 10;
            }
            ctx.fillStyle = ottMode ? SW.hotPink : 'rgba(200,100,120,0.55)';
            ctx.font = `bold 11px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(ottMode ? 'OTT' : 'NORMAL', ob.x+ob.w/2, ob.y+ob.h/2);
            if(ottMode) ctx.restore();
        }

        // Sync toggle
        const sb = drumBounds.syncBtn;
        ctx.fillStyle = syncEnabled ? '#1a0830' : '#0a0318';
        rrect(sb.x, sb.y, sb.w, sb.h, 6,6,6,6); ctx.fill();
        ctx.strokeStyle = syncEnabled ? '#00e5ff' : 'rgba(139,0,32,0.4)';
        ctx.lineWidth = syncEnabled ? 2 : 1.5;
        rrect(sb.x, sb.y, sb.w, sb.h, 6,6,6,6); ctx.stroke();
        ctx.fillStyle = syncEnabled ? SW.amber : 'rgba(200,100,120,0.6)';
        ctx.font = `bold 14px ${FONT}`; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('SYNC ' + (syncEnabled?'ON':'OFF'), sb.x+sb.w/2, sb.y+sb.h/2);
    }

    function drawOrbs() {
        for(const o of orbs){
            if(o.x<-50||o.x>W+50) continue;
            const a = o.alpha;

            // o.hue is either chord hue (0-360) or note pitch hue — use directly
            const orbHue = o.hue;
            const cr = o.radius * 1.2; // circle draw radius

            // ── Shed debris — particles left behind in world space ───────────
            if(o.debris.length > 0) {
                ctx.save();
                ctx.globalCompositeOperation = 'screen';
                for(const d of o.debris) {
                    const da = d.alpha * a;
                    if(da < 0.015) continue;
                    // Sparks (small circles) render brighter; shapes are softer
                    const lightness = d.sz < 1.5 ? 95 : 60 + d.alpha * 22;
                    drawTrailShape(d.x, d.y, d.sz, d.rot, d.shapeIdx,
                                   hsl(d.hue, 100, lightness), da);
                }
                ctx.restore();

                // Opaque mask — hide debris overlapping the orb body
                ctx.save();
                ctx.globalAlpha = o.alpha;
                ctx.fillStyle = '#0c0614';
                ctx.beginPath(); ctx.arc(o.x, o.y, cr * 0.92, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            }

            // ── Bloom glow ──────────────────────────────────────────────────
            const bloom = 1 + o.bloomPulse * 1.0;
            const gr = o.radius * (3.5 + o.bloomPulse * 2) * bloom;
            const gg = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, gr);
            const ba = Math.min(1, 0.28 + o.bloomPulse * 0.3) * a;
            gg.addColorStop(0, `hsla(${orbHue},100%,80%,${ba})`);
            gg.addColorStop(0.25, `hsla(${orbHue},90%,60%,${(0.10+o.bloomPulse*0.12)*a})`);
            gg.addColorStop(1, `hsla(${orbHue},80%,50%,0)`);
            ctx.fillStyle = gg;
            ctx.beginPath(); ctx.arc(o.x, o.y, gr, 0, Math.PI*2); ctx.fill();

            // ── Circle — glow pass then crisp core ─────────────────────────
            ctx.save();
            const travelAngle = Math.atan2(o.vy, o.vx);
            ctx.globalAlpha = 0.32 * a;
            ctx.strokeStyle = hsl(orbHue, 100, 70);
            ctx.lineWidth = 7;
            pathOrbShape(o.x, o.y, cr, o.shape, travelAngle); ctx.stroke();

            ctx.globalAlpha = 0.95 * a;
            ctx.strokeStyle = hsl(orbHue, 100, 88);
            ctx.lineWidth = 3.5;
            pathOrbShape(o.x, o.y, cr, o.shape, travelAngle); ctx.stroke();
            ctx.restore();

        }
    }

    function rrect(x,y,w,h,tl,tr,br,bl) {
        ctx.beginPath();
        ctx.moveTo(x+tl,y); ctx.lineTo(x+w-tr,y);
        ctx.quadraticCurveTo(x+w,y,x+w,y+tr);
        ctx.lineTo(x+w,y+h-br);
        ctx.quadraticCurveTo(x+w,y+h,x+w-br,y+h);
        ctx.lineTo(x+bl,y+h);
        ctx.quadraticCurveTo(x,y+h,x,y+h-bl);
        ctx.lineTo(x,y+tl); ctx.quadraticCurveTo(x,y,x+tl,y);
        ctx.closePath();
    }

    // Generic up/down spinner widget used by all three selectors
    function drawSpinner(bounds, label, valueText, valueColor, borderColor) {
        const {x,y,w,h} = bounds;
        if(w===0) return;
        ctx.save();
        ctx.fillStyle = '#0a0a18';
        rrect(x,y,w,h,6,6,6,6); ctx.fill();
        const spinnerBorder = (pivotFlashT > 0)
            ? `hsla(${pivotHue},80%,60%,${0.3 + pivotFlashT * 0.7})`
            : (borderColor||'rgba(255,69,0,0.3)');
        ctx.strokeStyle = spinnerBorder; ctx.lineWidth = pivotFlashT > 0 ? 1.5 : 1;
        rrect(x,y,w,h,6,6,6,6); ctx.stroke();

        ctx.textAlign='center'; ctx.textBaseline='middle';
        const cx = x + w/2;

        // Label
        ctx.fillStyle = SW.amber; ctx.font = '12px '+FONT;
        ctx.fillText(label, cx, y+11);

        // Up arrow
        const arrowW = Math.min(10, w*0.30);
        const upY = y + h*0.30;
        ctx.fillStyle = SW.orange; ctx.beginPath();
        ctx.moveTo(cx, upY-arrowW*0.8); ctx.lineTo(cx+arrowW, upY+arrowW*0.4);
        ctx.lineTo(cx-arrowW, upY+arrowW*0.4); ctx.closePath(); ctx.fill();

        // Value text — soft glow ring behind it
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = valueColor||SW.amber;
        ctx.beginPath(); ctx.arc(cx, y+h/2, w*0.40, 0, Math.PI*2); ctx.fill();
        // Pivot flash: extra hue-colored corona on KEY/MODE spinners
        if(pivotFlashT > 0) {
            const pfe = pivotFlashT * pivotFlashT * (3 - 2 * pivotFlashT);
            ctx.globalAlpha = pfe * 0.55;
            ctx.fillStyle = `hsla(${pivotHue},90%,65%,1)`;
            ctx.beginPath(); ctx.arc(cx, y+h/2, w*0.52, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = pfe * 0.20;
            ctx.fillStyle = `hsla(${pivotHue},80%,70%,1)`;
            ctx.beginPath(); ctx.arc(cx, y+h/2, w*0.72, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = pivotFlashT > 0
            ? `hsla(${pivotHue},90%,80%,${0.4 + pivotFlashT * 0.6})`
            : (valueColor||SW.amber);
        ctx.font = '22px '+FONT;
        ctx.fillText(valueText, cx, y+h/2+1);

        // Down arrow
        const dnY = y + h*0.72;
        ctx.fillStyle = SW.orange; ctx.beginPath();
        ctx.moveTo(cx, dnY+arrowW*0.8); ctx.lineTo(cx+arrowW, dnY-arrowW*0.4);
        ctx.lineTo(cx-arrowW, dnY-arrowW*0.4); ctx.closePath(); ctx.fill();

        ctx.restore();
    }

    function drawKeySelector() {
        drawSpinner(keySelBounds, 'KEY', NOTE_NAMES[currentKey], SW.amber);
    }

    function drawModeSelector() {
        drawSpinner(modeSelBounds, 'MODE', MODES[currentMode].short, SW.orange);
    }

    function drawSoundSelector() {
        const p = SOUND_PRESETS[currentPreset];
        // Taller box: draw label + arrows + name + index dots
        const {x,y,w,h} = soundSelBounds;
        if(w===0) return;
        ctx.save();
        ctx.fillStyle = '#0a0a18';
        rrect(x,y,w,h,6,6,6,6); ctx.fill();
        ctx.strokeStyle = 'rgba(255,69,0,0.3)'; ctx.lineWidth=1;
        rrect(x,y,w,h,6,6,6,6); ctx.stroke();

        ctx.textAlign='center'; ctx.textBaseline='middle';
        const cx = x + w/2;

        // Label
        ctx.fillStyle = SW.amber; ctx.font = '12px '+FONT; ctx.fillText('SOUND', cx, y+11);

        // Up arrow
        const arrowW = Math.min(10, w*0.30);
        const upY = y + h*0.22;
        ctx.fillStyle = SW.orange; ctx.beginPath();
        ctx.moveTo(cx, upY-arrowW*0.8); ctx.lineTo(cx+arrowW, upY+arrowW*0.4);
        ctx.lineTo(cx-arrowW, upY+arrowW*0.4); ctx.closePath(); ctx.fill();

        // Glow + name
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(cx, y+h/2, w*0.44, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = p.color; ctx.font = '18px '+FONT;
        ctx.fillText(p.name, cx, y+h/2);

        // Down arrow
        const dnY = y + h*0.76;
        ctx.fillStyle = SW.orange; ctx.beginPath();
        ctx.moveTo(cx, dnY+arrowW*0.8); ctx.lineTo(cx+arrowW, dnY-arrowW*0.4);
        ctx.lineTo(cx-arrowW, dnY-arrowW*0.4); ctx.closePath(); ctx.fill();

        // Index dots at bottom
        const dotR = 3, dotSpacing = 9;
        const dotsW = (SOUND_PRESETS.length-1)*dotSpacing;
        const dotStartX = cx - dotsW/2;
        for(let i=0; i<SOUND_PRESETS.length; i++) {
            ctx.globalAlpha = i===currentPreset ? 1 : 0.25;
            ctx.fillStyle = i===currentPreset ? p.color : SW.amber;
            ctx.beginPath();
            ctx.arc(dotStartX+i*dotSpacing, y+h-11, dotR, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // ─── BED selector drawing (same style as sound selector, teal palette) ────
    function drawBedSelector() {
        const p = BED_PRESETS[currentBed];
        const {x,y,w,h} = bedBounds;
        if(w===0) return;
        ctx.save();
        ctx.fillStyle = bedEnabled ? '#040f0e' : '#080d0c';
        rrect(x,y,w,h,6,6,6,6); ctx.fill();
        // Border — teal glow when active
        if(bedEnabled) {
            ctx.shadowColor = p.color; ctx.shadowBlur = 10;
            ctx.strokeStyle = p.color+'cc'; ctx.lineWidth = 1.5;
        } else {
            ctx.strokeStyle = 'rgba(0,180,130,0.25)'; ctx.lineWidth = 1;
        }
        rrect(x,y,w,h,6,6,6,6); ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.textAlign='center'; ctx.textBaseline='middle';
        const cx = x + w/2;

        // Label
        const labelCol = bedEnabled ? p.color : 'rgba(0,180,130,0.6)';
        ctx.fillStyle = labelCol; ctx.font = '12px '+FONT;
        ctx.fillText('BED', cx, y+11);

        // Up arrow
        const arrowW = Math.min(10, w*0.30);
        const upY = y + h*0.22;
        ctx.fillStyle = bedEnabled ? p.color : 'rgba(0,180,130,0.45)';
        ctx.beginPath();
        ctx.moveTo(cx, upY-arrowW*0.8); ctx.lineTo(cx+arrowW, upY+arrowW*0.4);
        ctx.lineTo(cx-arrowW, upY+arrowW*0.4); ctx.closePath(); ctx.fill();

        // Glow ring + name
        ctx.globalAlpha = bedEnabled ? 0.22 : 0.08;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(cx, y+h/2, w*0.44, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = bedEnabled ? p.color : 'rgba(0,180,130,0.50)';
        ctx.font = '18px '+FONT;
        ctx.fillText(p.name, cx, y+h/2 - (bedLoading ? 8 : 0));

        // Loading spinner + status text
        if(bedLoading) {
            const spin = (globalTime * 3) % (Math.PI * 2);
            ctx.strokeStyle = p.color; ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.7;
            ctx.beginPath(); ctx.arc(cx - 10, y+h/2+12, 5, spin, spin + Math.PI * 1.4);
            ctx.stroke();
            ctx.fillStyle = p.color; ctx.font = `10px ${FONT}`; ctx.globalAlpha = 0.7;
            ctx.fillText('LOADING', cx + 4, y+h/2+13);
            ctx.globalAlpha = 1;
        }

        // Down arrow
        const dnY = y + h*0.76;
        ctx.fillStyle = bedEnabled ? p.color : 'rgba(0,180,130,0.45)';
        ctx.beginPath();
        ctx.moveTo(cx, dnY+arrowW*0.8); ctx.lineTo(cx+arrowW, dnY-arrowW*0.4);
        ctx.lineTo(cx-arrowW, dnY-arrowW*0.4); ctx.closePath(); ctx.fill();

        // Index dots
        const dotR = 3, dotSpacing = 9;
        const dotsW = (BED_PRESETS.length-1)*dotSpacing;
        const dotStartX = cx - dotsW/2;
        for(let i=0; i<BED_PRESETS.length; i++) {
            ctx.globalAlpha = i===currentBed ? 1 : 0.25;
            ctx.fillStyle = i===currentBed ? p.color : 'rgba(0,180,130,0.6)';
            ctx.beginPath();
            ctx.arc(dotStartX+i*dotSpacing, y+h-11, dotR, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // ─── Octave toggle drawing ─────────────────────────────────────────────────
    function drawOctaveToggle() {
        const {x,y,w,h} = octaveBounds;
        if(w===0) return;
        ctx.save();

        // Background
        ctx.fillStyle = '#07070f';
        rrect(x,y,w,h,6,6,6,6); ctx.fill();

        // Border — cyan tint, brighter when shifted
        const shifted = currentOctave !== 0;
        const borderAlpha = shifted ? 0.7 : 0.22;
        ctx.strokeStyle = `rgba(0,240,255,${borderAlpha})`;
        ctx.lineWidth = shifted ? 1.5 : 1;
        if(shifted) { ctx.shadowColor='#00f0ff'; ctx.shadowBlur=6; }
        rrect(x,y,w,h,6,6,6,6); ctx.stroke();
        ctx.shadowBlur = 0;

        const cx = x + w/2;
        const cy = y + h/2;

        // Label at top
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = 'rgba(0,240,255,0.5)';
        ctx.font = `11px ${FONT}`;
        ctx.fillText('OCTAVE', cx, y + 13);

        // ◄ left arrow button zone (left 30%)
        const arrowZoneW = w * 0.28;
        const arrowCX_L  = x + arrowZoneW * 0.5;
        const arrowCX_R  = x + w - arrowZoneW * 0.5;
        const arrowY     = cy + 6;
        const arrowSz    = 9;
        const canGoLeft  = currentOctave > -2;
        const canGoRight = currentOctave < 2;

        // Left arrow ◄
        ctx.fillStyle = canGoLeft ? '#00f0ff' : 'rgba(0,240,255,0.2)';
        ctx.beginPath();
        ctx.moveTo(arrowCX_L - arrowSz*0.8, arrowY);
        ctx.lineTo(arrowCX_L + arrowSz*0.6, arrowY - arrowSz*0.7);
        ctx.lineTo(arrowCX_L + arrowSz*0.6, arrowY + arrowSz*0.7);
        ctx.closePath(); ctx.fill();

        // Right arrow ►
        ctx.fillStyle = canGoRight ? '#00f0ff' : 'rgba(0,240,255,0.2)';
        ctx.beginPath();
        ctx.moveTo(arrowCX_R + arrowSz*0.8, arrowY);
        ctx.lineTo(arrowCX_R - arrowSz*0.6, arrowY - arrowSz*0.7);
        ctx.lineTo(arrowCX_R - arrowSz*0.6, arrowY + arrowSz*0.7);
        ctx.closePath(); ctx.fill();

        // Octave value display — large centred text
        const octLabel = currentOctave === 0 ? '0'
                        : currentOctave > 0  ? `+${currentOctave}`
                        : `${currentOctave}`;
        const valColor = currentOctave === 0 ? 'rgba(0,240,255,0.55)'
                        : currentOctave > 0  ? '#ffda00'
                        : '#ff2975';
        // Subtle glow circle behind label
        ctx.globalAlpha = shifted ? 0.12 : 0.06;
        ctx.fillStyle = valColor;
        ctx.beginPath(); ctx.arc(cx, arrowY, 22, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;

        ctx.fillStyle = valColor;
        ctx.font = `bold 28px ${FONT}`;
        ctx.fillText(octLabel, cx, arrowY);

        // Small pip dots showing range (-2 to +2) at bottom
        const pipCount = 5; // one per octave step
        const pipSpacing = 12;
        const pipStartX = cx - (pipCount-1)/2 * pipSpacing;
        for(let i=0; i<pipCount; i++) {
            const oct = i - 2; // maps 0→-2, 1→-1, 2→0, 3→+1, 4→+2
            const isActive = oct === currentOctave;
            ctx.globalAlpha = isActive ? 1 : 0.2;
            ctx.fillStyle = isActive ? valColor : '#00f0ff';
            ctx.beginPath();
            ctx.arc(pipStartX + i*pipSpacing, y+h-11, isActive ? 4 : 2.5, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    // ─── BED audio system ─────────────────────────────────────────────────────
    // Recordings are fetched, silence-trimmed, crossfade-looped, then played
    // through a wet/dry reverb split. Prepared buffers are cached per preset.

    function makeBedReverb() {
        const sr  = audioCtx.sampleRate;
        const dur = 3.8; // long lush tail suits nature sounds
        const len = Math.floor(sr * dur);
        const buf = audioCtx.createBuffer(2, len, sr);
        for(let ch = 0; ch < 2; ch++) {
            const d = buf.getChannelData(ch);
            const offset = ch * Math.floor(sr * 0.021); // stereo decorrelation
            for(let i = 0; i < len; i++) {
                const t = (i + offset) / sr;
                const env = Math.pow(Math.max(0, 1 - t / dur), 2.0);
                d[i] = (Math.random()*2-1) * env * 0.26;
            }
        }
        const conv = audioCtx.createConvolver();
        conv.buffer = buf;
        return conv;
    }

    function ensureBedGain() {
        if(!bedGainNode) {
            bedGainNode = audioCtx.createGain();
            bedGainNode.gain.value = 0;
            bedGainNode.connect(masterBus);
        }
        if(!bedRevNode) {
            bedRevNode    = makeBedReverb();
            bedRevWetGain = audioCtx.createGain();
            bedRevWetGain.gain.value = 0.42; // 42% wet send
            bedRevNode.connect(bedRevWetGain);
            bedRevWetGain.connect(bedGainNode);
        }
    }

    function stopBedSrc() {
        if(bedSrc) { try { bedSrc.stop(); } catch(e) {} bedSrc = null; }
        bedExtraNodes.forEach(n => { try { n.stop?.(); n.disconnect?.(); } catch(e) {} });
        bedExtraNodes = [];
    }

    // Strip leading/trailing silence using 50ms RMS windows (keeps 200ms padding)
    function trimSilentEdges(buf, threshold = 0.003) {
        const sr  = buf.sampleRate;
        const win = Math.floor(sr * 0.05);  // 50ms window
        const pad = Math.floor(sr * 0.20);  // 200ms padding kept
        const ch0 = buf.getChannelData(0);
        const len = buf.length;
        function rms(s) {
            const e = Math.min(s + win, len); let sum = 0;
            for(let i = s; i < e; i++) sum += ch0[i]*ch0[i];
            return Math.sqrt(sum / (e - s));
        }
        let start = 0;
        for(let i = 0; i + win < len; i += win) {
            if(rms(i) > threshold) { start = Math.max(0, i - pad); break; }
        }
        let end = len;
        for(let i = len - win; i > 0; i -= win) {
            if(rms(i) > threshold) { end = Math.min(len, i + win + pad); break; }
        }
        if(start === 0 && end === len) return buf;
        const out = audioCtx.createBuffer(buf.numberOfChannels, end - start, sr);
        for(let ch = 0; ch < buf.numberOfChannels; ch++)
            out.getChannelData(ch).set(buf.getChannelData(ch).subarray(start, end));
        return out;
    }

    // Cosine crossfade at loop point — blends tail back into head for a seamless loop
    function makeCrossfadeLoop(buf) {
        const sr  = buf.sampleRate;
        const len = buf.length;
        const xfadeSec = Math.min(2.0, (len / sr) * 0.18); // up to 2s, max 18% of duration
        const xLen = Math.floor(sr * xfadeSec);
        if(xLen < 512 || len <= xLen * 2) return buf;
        const out = audioCtx.createBuffer(buf.numberOfChannels, len, sr);
        for(let ch = 0; ch < buf.numberOfChannels; ch++) {
            const src = buf.getChannelData(ch);
            const dst = out.getChannelData(ch);
            dst.set(src);
            for(let i = 0; i < xLen; i++) {
                const t       = i / xLen;
                const fadeIn  = 0.5 - 0.5 * Math.cos(Math.PI * t); // 0→1
                const fadeOut = 1 - fadeIn;                          // 1→0
                dst[len - xLen + i] = src[len - xLen + i] * fadeOut + src[i] * fadeIn;
            }
        }
        return out;
    }

    // Prepare a decoded buffer for looped playback: trim silence then crossfade the loop point
    function prepareBedBuffer(buf) { return makeCrossfadeLoop(trimSilentEdges(buf)); }

    // Start an AudioBufferSourceNode through a 70/42% dry/wet reverb split
    function startBedBuffer(buf) {
        stopBedSrc();
        ensureBedGain();
        const src = audioCtx.createBufferSource();
        src.buffer = buf; src.loop = true;
        // Dry path
        const dryGain = audioCtx.createGain(); dryGain.gain.value = 0.70;
        src.connect(dryGain); dryGain.connect(bedGainNode);
        // Wet path through shared reverb
        src.connect(bedRevNode);
        src.start();
        bedSrc = src;
    }

    // Search Wikimedia Commons for AUDIO files only — uses generator+imageinfo to filter by MIME type
    async function searchWikiAudio(query) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 10000);
        try {
            // generator=search + prop=imageinfo&iiprop=mime lets us filter to audio/* before fetching
            const r = await fetch(
                'https://commons.wikimedia.org/w/api.php?action=query&generator=search' +
                '&gsrsearch=' + encodeURIComponent(query) +
                '&gsrnamespace=6&gsrlimit=12' +
                '&prop=imageinfo&iiprop=mime' +
                '&format=json&origin=*',
                { signal: ctrl.signal }
            );
            clearTimeout(tid);
            if(!r.ok) return [];
            const d = await r.json();
            return Object.values(d.query?.pages || {})
                .filter(p => p.imageinfo?.[0]?.mime?.startsWith('audio/'))
                .map(p => p.title.replace(/^File:/, ''));
        } catch(e) { clearTimeout(tid); return []; }
    }

    // Try to fetch one Wikimedia file — prefers MP3 transcode (works on Safari), falls back to OGG
    async function tryFetchWikiFile(filename) {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 8000);
        try {
            // Request both videoinfo (has derivatives/transcodes) and imageinfo (has original URL)
            const apiResp = await fetch(
                'https://commons.wikimedia.org/w/api.php?action=query' +
                '&titles=File:' + encodeURIComponent(filename) +
                '&prop=videoinfo|imageinfo&viprop=url|derivatives&iiprop=url&format=json&origin=*',
                { signal: ctrl.signal }
            );
            clearTimeout(tid);
            if(!apiResp.ok) return null;
            const data = await apiResp.json();
            const page = Object.values(data.query.pages)[0];
            if(!page || page.missing !== undefined) return null;

            // Prefer a transcoded MP3 (broad browser compatibility incl. Safari)
            let audioUrl = null;
            const vi = page.videoinfo?.[0];
            if(vi) {
                const derivs = vi.derivatives || [];
                const mp3 = derivs.find(d => d.type === 'audio/mpeg' || d.shorttitle?.endsWith('.mp3'));
                audioUrl = mp3?.src || vi.url;
            }
            // Fall back to imageinfo original URL
            if(!audioUrl) audioUrl = page.imageinfo?.[0]?.url;
            if(!audioUrl) return null;

            const ctrl2 = new AbortController();
            const tid2 = setTimeout(() => ctrl2.abort(), 30000);
            const resp = await fetch(audioUrl, { signal: ctrl2.signal });
            clearTimeout(tid2);
            if(!resp.ok) return null;
            const arrayBuf = await resp.arrayBuffer();
            return await audioCtx.decodeAudioData(arrayBuf);
        } catch(e) {
            clearTimeout(tid);
            return null;
        }
    }

    // Fetch all candidate filenames for a preset: start with known filenames,
    // then fall back to a Wikimedia Commons search for presets that need it.
    async function resolveBedFiles(idx) {
        const preset = BED_PRESETS[idx];
        let filenames = [...preset.files]; // try hardcoded names first (faster)
        if(preset.search) {
            const found = await searchWikiAudio(preset.search); // then search-discovered audio files
            filenames = [...filenames, ...found];
        }
        return filenames;
    }

    async function loadBedRecording() {
        if(!audioReady) return;
        ensureBedGain();
        const bedIdx = currentBed;

        // Use cached buffer immediately if available
        if(bedBufCache[bedIdx]) { startBedBuffer(bedBufCache[bedIdx]); return; }

        bedLoading = true;
        const filenames = await resolveBedFiles(bedIdx);
        for(const file of filenames) {
            if(currentBed !== bedIdx) { bedLoading = false; return; } // user switched preset
            const buf = await tryFetchWikiFile(file);
            if(buf) {
                const prepared = prepareBedBuffer(buf);
                bedBufCache[bedIdx] = prepared;
                if(currentBed === bedIdx && bedEnabled) startBedBuffer(prepared);
                bedLoading = false;
                return;
            }
        }
        bedLoading = false; // all sources exhausted — silent
    }

    function changeBed(dir) {
        currentBed = (currentBed + dir + BED_PRESETS.length) % BED_PRESETS.length;
        if(bedEnabled) { stopBedSrc(); loadBedRecording(); }
    }

    function preloadAllBeds() {
        if(!audioCtx) return;
        for(let i = 0; i < BED_PRESETS.length; i++) {
            (async (idx) => {
                if(bedBufCache[idx]) return;
                const filenames = await resolveBedFiles(idx);
                for(const file of filenames) {
                    const buf = await tryFetchWikiFile(file);
                    if(buf) { bedBufCache[idx] = prepareBedBuffer(buf); return; }
                }
            })(i);
        }
    }

    function toggleBed() {
        if(!audioReady) return;
        bedEnabled = !bedEnabled;
        ensureBedGain();
        if(bedEnabled) {
            loadBedRecording();
            const t = audioCtx.currentTime;
            bedGainNode.gain.cancelScheduledValues(t);
            bedGainNode.gain.setValueAtTime(bedGainNode.gain.value, t);
            bedGainNode.gain.linearRampToValueAtTime(0.8, t + 2.5);
        } else {
            stopBedSrc();
            const t = audioCtx.currentTime;
            bedGainNode.gain.cancelScheduledValues(t);
            bedGainNode.gain.setValueAtTime(bedGainNode.gain.value, t);
            bedGainNode.gain.linearRampToValueAtTime(0, t + 1.5);
        }
    }


        function drawKeyboardGrid(ky) {
        ctx.save();
        ctx.strokeStyle='rgba(90,40,50,0.38)';
        ctx.lineWidth=1;
        const gridStep = 20;
        for(let y=ky; y<H; y+=gridStep) {
            ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
        }
        for(let x=0; x<W; x+=gridStep) {
            ctx.beginPath(); ctx.moveTo(x,ky); ctx.lineTo(x,H); ctx.stroke();
        }
        ctx.restore();
    }

    function drawUIPanelBorder() {
        // Glowing neon separator between the landscape and the input panel — drawn for both tabs
        ctx.save();
        const lineY = sceneH;
        // Soft wide glow beneath the line
        const glowG = ctx.createLinearGradient(0, lineY - 6, 0, lineY + 10);
        glowG.addColorStop(0,   'rgba(0,0,0,0)');
        glowG.addColorStop(0.35,'rgba(220,20,90,0.12)');
        glowG.addColorStop(0.65,'rgba(220,20,90,0.35)');
        glowG.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = glowG;
        ctx.fillRect(0, lineY - 6, W, 16);
        // Core crimson line
        ctx.strokeStyle = '#c8104e';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(W, lineY); ctx.stroke();
        // Bright inner highlight
        ctx.strokeStyle = 'rgba(255,160,200,0.55)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(0, lineY); ctx.lineTo(W, lineY); ctx.stroke();
        ctx.restore();
    }

    function drawKeyboard() {
        // Only draw keyboard if in sound tab
        if(currentTab === 'sound') {
            const ky=H-KEYBOARD_HEIGHT;

            ctx.fillStyle='#08080f';
            ctx.fillRect(0,ky,W,KEYBOARD_HEIGHT);

            drawKeyboardGrid(ky);

            // White keys
            for(const n of whites){
                const g=ctx.createLinearGradient(0,n.y,0,n.y+n.h);
                if(n.pressed){g.addColorStop(0,'#2a1510');g.addColorStop(1,'#180a08');}
                else{g.addColorStop(0,'#252e42');g.addColorStop(1,'#182030');}
                ctx.fillStyle=g; rrect(n.x,n.y,n.w,n.h,0,0,5,5); ctx.fill();
                ctx.strokeStyle=n.pressed?'rgba(255,69,0,0.6)':'rgba(140,70,80,0.65)'; ctx.lineWidth=0.8;
                rrect(n.x,n.y,n.w,n.h,0,0,5,5); ctx.stroke();
                if(n.pressed){
                    ctx.strokeStyle='rgba(255,69,0,0.7)'; ctx.lineWidth=2;
                    rrect(n.x,n.y,n.w,n.h,0,0,5,5); ctx.stroke();
                }
            }
            // Black keys
            for(const n of blacks){
                if(n.x===undefined) continue;
                const g=ctx.createLinearGradient(0,n.y,0,n.y+n.h);
                if(n.pressed){g.addColorStop(0,'#201008');g.addColorStop(1,'#100804');}
                else{g.addColorStop(0,'#060810');g.addColorStop(1,'#030508');}
                ctx.fillStyle=g; rrect(n.x,n.y,n.w,n.h,0,0,4,4); ctx.fill();
                ctx.strokeStyle='rgba(0,0,0,0.8)'; ctx.lineWidth=1;
                rrect(n.x,n.y,n.w,n.h,0,0,4,4); ctx.stroke();
                if(n.pressed){
                    ctx.strokeStyle='rgba(255,69,0,0.7)'; ctx.lineWidth=2;
                    rrect(n.x,n.y,n.w,n.h,0,0,4,4); ctx.stroke();
                }
            }

            // Chord buttons — synthwave colors
            ctx.font='16px '+FONT; ctx.textAlign='center'; ctx.textBaseline='middle';
            const nCh = chords.length;
            for(let ci = 0; ci < nCh; ci++){
                const ch = chords[ci];
                const active = ch.pressed;
                // Cascade flash: each button peaks at a different time (left → right sweep)
                let cascadeFlash = 0;
                if(chordCascadeT >= 0) {
                    const t = Math.max(0, Math.min(1, chordCascadeT * (nCh + 1) - ci));
                    cascadeFlash = 1 - Math.abs(t * 2 - 1);  // triangle, peaks at t=0.5
                }
                ctx.fillStyle=active?'#1a0c08':'#0c0808';
                rrect(ch.x,ch.y,ch.w,ch.h,6,6,6,6); ctx.fill();
                // Cascade glow layer (screen blend over the base fill)
                if(cascadeFlash > 0) {
                    ctx.save();
                    ctx.globalCompositeOperation = 'screen';
                    ctx.globalAlpha = cascadeFlash * 0.65;
                    ctx.fillStyle = `hsla(${pivotHue},80%,55%,1)`;
                    rrect(ch.x,ch.y,ch.w,ch.h,6,6,6,6); ctx.fill();
                    ctx.restore();
                }
                ctx.strokeStyle=active?SW.orange
                    : cascadeFlash > 0 ? `hsla(${pivotHue},70%,55%,${0.3 + cascadeFlash * 0.7})`
                    : 'rgba(139,0,32,0.3)';
                ctx.lineWidth=active||cascadeFlash>0 ? 2 : 1;
                rrect(ch.x,ch.y,ch.w,ch.h,6,6,6,6); ctx.stroke();
                ctx.fillStyle=active?SW.amber
                    : cascadeFlash > 0 ? `hsla(${pivotHue},90%,75%,${0.5 + cascadeFlash * 0.5})`
                    : SW.crimson;
                ctx.fillText(ch.name,ch.x+ch.w/2,ch.y+ch.h/2);
            }

            // ── Pivot key-change row ──────────────────────────────────────────
            if(pivotSuggestions.length > 0) {
                ctx.textAlign='center'; ctx.textBaseline='middle';
                for(const pv of pivotSuggestions) {
                    const active = pv.pressed;
                    // Dark teal-tinted background
                    ctx.fillStyle = active ? '#0a1418' : '#060c10';
                    rrect(pv.x, pv.y, pv.w, pv.h, 4, 4, 4, 4); ctx.fill();
                    // Teal/cyan border — distinct from warm chord row
                    const borderAlpha = active ? 1.0 : 0.45;
                    ctx.strokeStyle = active
                        ? `hsla(${pv.hue},80%,60%,1)`
                        : `hsla(${pv.hue},60%,50%,${borderAlpha})`;
                    ctx.lineWidth = active ? 2 : 1;
                    rrect(pv.x, pv.y, pv.w, pv.h, 4, 4, 4, 4); ctx.stroke();
                    // Key name (larger) + mode abbrev (smaller) — two lines
                    const [keyPart, modePart] = pv.label.split(' ');
                    const midX = pv.x + pv.w / 2;
                    ctx.fillStyle = active
                        ? `hsla(${pv.hue},90%,72%,1)`
                        : `hsla(${pv.hue},70%,60%,0.9)`;
                    ctx.font = `bold 14px ${FONT}`;
                    ctx.fillText(keyPart,  midX, pv.y + pv.h * 0.36);
                    ctx.font = `10px ${FONT}`;
                    ctx.fillStyle = active
                        ? `hsla(${pv.hue},70%,60%,1)`
                        : `hsla(${pv.hue},50%,50%,0.7)`;
                    ctx.fillText(modePart, midX, pv.y + pv.h * 0.72);
                }
            } else {
                // Placeholder hint when no chord has been pressed yet
                const pvY = layoutPivotY + PIVOT_BTN_H / 2;
                ctx.font = `11px ${FONT}`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillStyle = 'rgba(0,180,180,0.25)';
                ctx.fillText('← play a chord for key-change suggestions', layoutStartX + layoutKbW / 2, pvY);
            }

            drawKeySelector();
            drawModeSelector();
            drawOctaveToggle();
            drawSoundSelector();
            drawBedSelector();

            // Auto-melody button
            if(autoMelBounds.w > 0) {
                const ab = autoMelBounds;
                const on = autoMelody;
                ctx.save();
                ctx.fillStyle = on ? '#081a06' : '#08080f';
                rrect(ab.x, ab.y, ab.w, ab.h, 5,5,5,5); ctx.fill();
                ctx.strokeStyle = on ? 'rgba(80,220,80,0.9)' : 'rgba(80,220,80,0.22)';
                ctx.lineWidth = on ? 2 : 1;
                rrect(ab.x, ab.y, ab.w, ab.h, 5,5,5,5); ctx.stroke();
                if(on) {
                    // Soft green inner glow
                    ctx.globalCompositeOperation = 'screen';
                    ctx.globalAlpha = 0.18;
                    ctx.fillStyle = '#40e040';
                    rrect(ab.x+2, ab.y+2, ab.w-4, ab.h-4, 4,4,4,4); ctx.fill();
                    ctx.globalCompositeOperation = 'source-over';
                    ctx.globalAlpha = 1;
                    // Pulsing dot
                    const pulse = 0.5 + 0.5 * Math.sin(globalTime * 2.8);
                    ctx.globalAlpha = 0.5 + pulse * 0.5;
                    ctx.fillStyle = '#60ff60';
                    ctx.beginPath();
                    ctx.arc(ab.x + ab.w/2, ab.y + ab.h * 0.72, 3.5, 0, Math.PI*2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
                ctx.fillStyle = on ? '#80ff80' : 'rgba(80,220,80,0.45)';
                ctx.font = `bold 15px ${FONT}`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('AUTO', ab.x + ab.w/2, ab.y + ab.h * (on ? 0.38 : 0.5));
                if(!on) {
                    ctx.fillStyle = 'rgba(80,180,80,0.28)';
                    ctx.font = `10px ${FONT}`;
                    ctx.fillText('melody', ab.x + ab.w/2, ab.y + ab.h * 0.68);
                }
                ctx.restore();
            }
            drawUIPanelBorder(); // neon separator — drawn after all content so it's crisp on top
            drawTabStrip(); // drawn last so it floats on top of keys
        } else {
            // Background, then drum sequencer content
            ctx.fillStyle='#08080f';
            ctx.fillRect(0, sceneH, W, KEYBOARD_HEIGHT);
            drawDrumSequencer();
            drawUIPanelBorder(); // neon separator — drawn after sequencer so it's crisp on top
            drawTabStrip(); // drawn last so it floats on top of sequencer
        }
    }

    // ─── Scene Mirror ───────────────────────────────────────────────────────
    // Captures the left half of the canvas (physical pixels) into mirrorBuf,
    // then flips it onto the right half.  Call AFTER terrain, BEFORE orbs.
    function mirrorSceneHalf() {
        if(!mirrorBuf) return;
        const dpr       = window.devicePixelRatio || 1;
        const halfPhys  = Math.round(W / 2 * dpr);
        const scenePhys = Math.round(sceneH * dpr);
        const tc = mirrorBuf.getContext('2d');
        tc.clearRect(0, 0, mirrorBuf.width, mirrorBuf.height);
        tc.drawImage(canvas, 0, 0, halfPhys, scenePhys, 0, 0, halfPhys, scenePhys);
        const fullPhys = Math.round(W * dpr);
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);   // reset to physical-pixel space
        ctx.translate(fullPhys, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(mirrorBuf, 0, 0);
        ctx.restore();
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // restore logical-pixel transform
    }

    // ─── Bass hit flourish ───────────────────────────────────────────────────
    function drawBassFlourish() {
        if(bassFlashT <= 0) return;
        const e = bassFlashT * bassFlashT * (3 - 2 * bassFlashT); // smoothstep 1→0

        ctx.save();
        ctx.globalCompositeOperation = 'screen';

        // Expanding shockwave ring
        const ringR = (1 - e) * 130 + 15;
        ctx.strokeStyle = hsl(bassFlashHue, 100, 82);
        ctx.lineWidth   = 4 * e + 1;
        ctx.globalAlpha = e * 0.88;
        ctx.beginPath(); ctx.arc(bassFlashX, bassFlashY, ringR, 0, Math.PI * 2); ctx.stroke();

        // Softer trailing ring at 65% radius
        ctx.strokeStyle = hsl(bassFlashHue, 70, 70);
        ctx.lineWidth   = 2;
        ctx.globalAlpha = e * e * 0.5;
        ctx.beginPath(); ctx.arc(bassFlashX, bassFlashY, ringR * 0.65, 0, Math.PI * 2); ctx.stroke();

        // 8 radial streaks shooting outward
        ctx.strokeStyle = hsl(bassFlashHue, 100, 92);
        ctx.lineWidth   = 1.5;
        const streakLen = (1 - e) * 95;
        const inner     = 14;
        for(let k = 0; k < 8; k++) {
            const ang = k / 8 * Math.PI * 2;
            ctx.globalAlpha = e * 0.82;
            ctx.beginPath();
            ctx.moveTo(bassFlashX + Math.cos(ang) * inner,
                       bassFlashY + Math.sin(ang) * inner);
            ctx.lineTo(bassFlashX + Math.cos(ang) * (inner + streakLen),
                       bassFlashY + Math.sin(ang) * (inner + streakLen));
            ctx.stroke();
        }

        ctx.restore();
    }

    // ─── Main Render ───
    function render() {
        ctx.clearRect(0,0,W,H);

        drawBackground();
        drawGeometricShapes();
        drawMountains();
        drawStarfield();
        drawDataStreams();

        // Neon terrain layers
        drawNeonGrid(0, 350, 0.3, 1.0);
        drawNeonGrid(1, 20,  0.6, 1.5);
        drawNeonGrid(2, 335, 1.0, 2.0);

        // Mirror the scene (background + terrain) before drawing orbs
        mirrorSceneHalf();

        // Draw orbs at real positions, then again mirrored — so every orb
        // appears symmetrically from spawn regardless of x position.
        drawOrbs();
        ctx.save();
        ctx.translate(W, 0);
        ctx.scale(-1, 1);
        drawOrbs();
        ctx.restore();

        drawBassFlourish();
        drawScanLines();

        // Deep purple vignette
        const vg=ctx.createRadialGradient(W/2,sceneH*0.45,sceneH*0.3,W/2,sceneH*0.45,W*0.75);
        vg.addColorStop(0,'rgba(0,0,0,0)');
        vg.addColorStop(0.7,'rgba(0,0,0,0)');
        vg.addColorStop(1,'rgba(12,4,8,0.45)');
        ctx.fillStyle=vg; ctx.fillRect(0,0,W,sceneH);

        drawKeyboard();
    }

    // ─── Loop ───
    function frame(t) {
        const dt=Math.min((t-lastT)/1000,0.05);
        lastT=t; update(dt); render();
        requestAnimationFrame(frame);
    }

    // ─── Input ───
    function noteAt(x,y) {
        for(const n of blacks){if(n.x===undefined)continue;if(x>=n.x&&x<=n.x+n.w&&y>=n.y&&y<=n.y+n.h)return n;}
        for(const n of whites){if(x>=n.x&&x<=n.x+n.w&&y>=n.y&&y<=n.y+n.h)return n;}
        return null;
    }
    function chordAt(x,y) {
        for(const ch of chords){if(x>=ch.x&&x<=ch.x+ch.w&&y>=ch.y&&y<=ch.y+ch.h)return ch;}
        return null;
    }
    function pivotAt(x,y) {
        for(const pv of pivotSuggestions){if(x>=pv.x&&x<=pv.x+pv.w&&y>=pv.y&&y<=pv.y+pv.h)return pv;}
        return null;
    }
    function spinnerHit(bounds, x, y) {
        const {x:bx,y:by,w,h} = bounds;
        if(x<bx||x>bx+w||y<by||y>by+h) return null;
        if(y < by+h*0.38) return 'up';
        if(y > by+h*0.62) return 'down';
        return 'middle';
    }

    function changeKey(dir) {
        currentKey = (currentKey + dir + 12) % 12;
        generateChords(currentKey);
        pivotSuggestions = [];   // clear until user presses a chord in the new key
        layout();
    }

    function changeMode(dir) {
        currentMode = (currentMode + dir + MODES.length) % MODES.length;
        generateChords(currentKey);
        pivotSuggestions = [];
        layout();
    }

    function changeOctave(dir) {
        currentOctave = Math.max(-2, Math.min(2, currentOctave + dir));
    }

    function changePreset(dir) {
        currentPreset = (currentPreset + dir + SOUND_PRESETS.length) % SOUND_PRESETS.length;
        if(audioReady) {
            const p = SOUND_PRESETS[currentPreset];
            const t = audioCtx.currentTime;
            dryBus.gain.setTargetAtTime(p.dry, t, 0.4);
            wetBus.gain.setTargetAtTime(p.wet, t, 0.4);
        }
    }



    // ════════════════════════════════════════
    //  AUTO-PLAY HELPERS
    // ════════════════════════════════════════

    // Weighted harmonic movement — biased toward resolution and diatonic neighbors
    function autoNextChord() {
        const moves = {
            0: [0, 0, 3, 4, 5, 7, 0],   // I   → stay, IV, V, vi, add9
            1: [0, 4, 0],                // ii  → I, V
            2: [3, 5, 0],                // iii → IV, vi, I
            3: [0, 0, 4, 5, 3],          // IV  → I, V, vi, stay
            4: [0, 0, 3, 5],             // V   → I, IV, vi
            5: [0, 3, 4, 0],             // vi  → I, IV, V
            6: [0, 4],                   // viø → I, V
            7: [0, 5, 3, 0],             // add9→ I, vi, IV
        };
        const row  = moves[autoMelChord] || [0];
        const opts = row.filter(i => i < chords.length);
        return opts[Math.floor(Math.random() * opts.length)];
    }

    // Generate a fresh, minimal ambient drum pattern
    function generateAutoDrumPattern() {
        for(let r = 0; r < 5; r++) drumPattern[r].fill(false);

        // KICK — beat 1 always; beat 3 often; occasional push on step 28
        drumPattern[0][0]  = true;
        if(Math.random() < 0.60) drumPattern[0][16] = true;
        if(Math.random() < 0.20) drumPattern[0][28] = true;

        // C-HH — sparse quarter/eighth note groove
        for(let s = 0; s < 32; s += 4) {
            if(Math.random() < 0.62) drumPattern[1][s] = true;
        }
        // Occasional single 16th-note fill in one bar quarter
        if(Math.random() < 0.28) {
            const g = Math.floor(Math.random() * 4) * 8;
            drumPattern[1][g + 2] = true;
        }

        // O-HH — very sparse open hats on off-beats
        for(let s = 4; s < 32; s += 8) {
            if(Math.random() < 0.25) drumPattern[2][s] = true;
        }

        // SNARE — tasteful beat 2 and/or 4, optional ghost
        if(Math.random() < 0.60) drumPattern[3][8]  = true;
        if(Math.random() < 0.50) drumPattern[3][24] = true;
        if(Math.random() < 0.16) drumPattern[3][12] = true; // ghost

        // RIM — very sparse accent, one or two hits max
        const rimCandidates = [4, 6, 12, 20, 26, 30];
        for(const s of rimCandidates) {
            if(Math.random() < 0.13) { drumPattern[4][s] = true; break; } // at most one
        }
    }

    // Subtle variation every 8 bars — flips 2-3 non-kick cells
    function varyAutoDrumPattern() {
        const numFlips = 2 + Math.floor(Math.random() * 2);
        for(let f = 0; f < numFlips; f++) {
            const row  = 1 + Math.floor(Math.random() * 4); // skip kick
            const step = Math.floor(Math.random() * 32);
            drumPattern[row][step] = !drumPattern[row][step];
        }
        // Occasionally swap the syncopated kick
        if(Math.random() < 0.38) drumPattern[0][28] = !drumPattern[0][28];
        // Small chance to flip beat-3 kick
        if(Math.random() < 0.22) drumPattern[0][16] = !drumPattern[0][16];
    }

    // ─── Auto-play schedulers (background-safe: use setTimeout / audio clock) ───

    function fireAutoMelodyEvent() {
        if(!autoMelody || !audioReady) return;
        let nextDelay;
        if(Math.random() < 0.72) {
            // Chord — the main ambient texture
            if(chords.length > 0) {
                fireChord(chords[autoMelChord]);
                autoMelChord = autoNextChord();
            }
            nextDelay = (8 + Math.random() * 12) * 1000;  // 8–20 s
        } else {
            // Single scale note — a gentle melodic touch
            const scale    = MODES[currentMode].scale;
            const degree   = scale[Math.floor(Math.random() * scale.length)];
            const targetPC = (currentKey + degree) % 12;
            const candidates = notes.filter(n => notes.indexOf(n) % 12 === targetPC);
            if(candidates.length > 0)
                pressNote(candidates[Math.floor(Math.random() * candidates.length)]);
            nextDelay = (3 + Math.random() * 7) * 1000;   // 3–10 s
        }
        autoMelTimeoutId = setTimeout(fireAutoMelodyEvent, nextDelay);
    }

    function startAutoMelody() {
        stopAutoMelody();
        autoMelChord = 0;
        // First event in 2–5 s
        autoMelTimeoutId = setTimeout(fireAutoMelodyEvent, (2 + Math.random() * 3) * 1000);
    }

    function stopAutoMelody() {
        if(autoMelTimeoutId) { clearTimeout(autoMelTimeoutId); autoMelTimeoutId = null; }
    }

    // ─── Drum Audio ─────────────────────────────────────────────────────────

    function makeDrumReverb() {
        const sr  = audioCtx.sampleRate;
        const len = Math.floor(sr * 2.4); // longer tail for lush room sound
        const buf = audioCtx.createBuffer(2, len, sr);
        for(let c=0;c<2;c++){
            const d = buf.getChannelData(c);
            for(let i=0;i<len;i++) {
                // Early reflections (first 50ms) are louder, then smooth exponential decay
                const t = i / sr;
                const early = t < 0.05 ? 1.0 + (1 - t/0.05) * 0.6 : 1.0;
                d[i] = (Math.random()*2-1) * Math.pow(1-i/len, 1.4) * 0.38 * early;
            }
        }
        const conv = audioCtx.createConvolver();
        conv.buffer = buf;
        return conv;
    }

    function initDrumAudio() {
        if(drumRevNode) return;
        drumRevNode = makeDrumReverb();
        drumRevNode.connect(masterBus);
        drumSCGain = audioCtx.createGain();
        drumSCGain.gain.value = 1;
        drumSCGain.connect(masterBus);
    }

    function applyDrumSidechain(t) {
        if(!drumSCGain || sidechainAmt < 0.01) return;
        let duck, rel;
        if(ottMode) {
            // OTT: slam everything to near-zero; slow musical release so the pump sweeps up
            duck = 0.004;
            rel  = (60 / drumBPM) * 0.68;  // long release = very pronounced breath of the pump
        } else {
            // Normal: steeper curve — at 55% knob → ~3%; at max → ~1%
            duck = Math.pow(1 - sidechainAmt, 5.0) * 0.97 + 0.01;
            rel  = (60 / drumBPM) * 0.38;
        }
        // Duck the non-kick drum bus
        const sc = drumSCGain.gain;
        sc.cancelScheduledValues(t);
        sc.setValueAtTime(1, t);
        sc.setValueAtTime(duck, t + 0.001);
        sc.setTargetAtTime(1, t + 0.001, rel / 3);
        // Also duck the melodic instrument bus for the classic pumping effect
        if(dryBus) {
            const origDry = dryBus.gain.value;  // capture current (may vary)
            const dm = dryBus.gain;
            dm.cancelScheduledValues(t);
            dm.setValueAtTime(origDry, t);
            dm.setValueAtTime(origDry * duck, t + 0.001);
            dm.setTargetAtTime(origDry, t + 0.001, rel / 3);
        }
        if(wetBus) {
            const origWet = wetBus.gain.value;
            const wm = wetBus.gain;
            wm.cancelScheduledValues(t);
            wm.setValueAtTime(origWet, t);
            wm.setValueAtTime(origWet * duck, t + 0.001);
            wm.setTargetAtTime(origWet, t + 0.001, rel / 3);
        }
    }

    function drumKick(t) {
        kickTimes.push(t); // queue for visual bloom — consumed in render loop
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(masterBus);
        // Reverb send — lush tail routed directly to masterBus (bypasses sidechain duck)
        if(drumRevNode) {
            const revSend  = audioCtx.createGain();
            revSend.gain.value = 0.82;
            // 18 ms pre-delay so the dry kick transient punches through first
            const preDel = audioCtx.createDelay(0.1);
            preDel.delayTime.value = 0.018;
            gain.connect(revSend); revSend.connect(preDel); preDel.connect(drumRevNode);
        }
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(38, t + 0.22);
        gain.gain.setValueAtTime(0.42, t);   // reduced from 0.58
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.32);
        osc.start(t); osc.stop(t + 0.36);
        applyDrumSidechain(t);
    }

    function drumNoise(t, hpFreq, duration, vol, reverb) {
        const sr  = audioCtx.sampleRate;
        const len = Math.floor(sr * (duration + 0.05));
        const buf = audioCtx.createBuffer(1, len, sr);
        const d   = buf.getChannelData(0);
        for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
        const src  = audioCtx.createBufferSource();
        src.buffer = buf;
        const hp   = audioCtx.createBiquadFilter();
        hp.type = 'highpass'; hp.frequency.value = hpFreq;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        const dest = reverb ? drumRevNode : drumSCGain;
        src.connect(hp); hp.connect(gain); gain.connect(dest);
        if(reverb) {
            // dry path too — slightly louder dry for presence
            const dry = audioCtx.createGain(); dry.gain.value = 0.45;
            gain.connect(dry); dry.connect(drumSCGain);
        }
        src.start(t);
    }

    // CHH: short, crisp — add a touch of reverb for air
    function drumCHH(t)  { chhTimes.push(t); drumNoise(t, 7000, 0.048, 0.26, true); }
    // OHH: open, washy reverb
    function drumOHH(t)  { ohhTimes.push(t); drumNoise(t, 5500, 0.28,  0.22, true); }
    function drumSnare(t){
        snareTimes.push(t);
        // noise burst + body tone — generous reverb
        drumNoise(t, 200, 0.22, 0.42, true);
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 185;
        osc.connect(gain); gain.connect(drumSCGain);
        gain.gain.setValueAtTime(0.18, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t+0.12);
        osc.start(t); osc.stop(t+0.14);
    }
    function drumRim(t)  {
        rimTimes.push(t);
        drumNoise(t, 1200, 0.065, 0.28, true); // reverb on rim for a roomy click
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.value = 900;
        osc.connect(gain); gain.connect(drumSCGain);
        gain.gain.setValueAtTime(0.22, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t+0.04);
        osc.start(t); osc.stop(t+0.06);
    }

    const DRUM_FNS = [drumKick, drumCHH, drumOHH, drumSnare, drumRim];

    function drumPlayStep(stepIdx, time) {
        for(let r=0;r<5;r++) {
            if(drumPattern[r][stepIdx]) DRUM_FNS[r](time);
        }
    }

    const DRUM_LOOKAHEAD_NORMAL = 0.10; // seconds ahead when tab is visible
    const DRUM_LOOKAHEAD_HIDDEN = 3.0;  // seconds ahead when tab is in background
    const DRUM_INTERVAL  = 25;   // ms scheduler polling interval
    let   drumLookahead  = DRUM_LOOKAHEAD_NORMAL;

    function drumStepDur() { return 60 / (drumBPM * 2); } // 8th note duration

    function drumSchedule() {
        if(!drumPlaying || !audioCtx) return;
        const now = audioCtx.currentTime;
        while(drumNextTime < now + drumLookahead) {
            // 8-bar auto-variation check (runs on audio clock, works in background)
            if(autoDrum && drumStartTime > 0) {
                const bar = Math.floor((drumNextTime - drumStartTime) / (drumStepDur() * DRUM_STEPS));
                if(bar !== autoDrumPrevBar) {
                    autoDrumPrevBar = bar;
                    if(bar > 0 && bar % 8 === 0) varyAutoDrumPattern();
                }
            }
            drumPlayStep(drumStep, drumNextTime);
            drumStep = (drumStep + 1) % DRUM_STEPS;
            drumNextTime += drumStepDur();
        }
    }

    function drumStart() {
        if(!audioCtx) return;
        initDrumAudio();
        drumPlaying   = true;
        drumStep      = 0;
        drumNextTime  = audioCtx.currentTime + 0.05;
        drumStartTime = drumNextTime; // anchor for visual playhead calculation
        if(drumSchedTimer) clearInterval(drumSchedTimer);
        drumSchedTimer = setInterval(drumSchedule, DRUM_INTERVAL);
    }

    function drumStop() {
        drumPlaying = false;
        drumStep    = -1;
        if(drumSchedTimer){ clearInterval(drumSchedTimer); drumSchedTimer=null; }
    }

    function drumToggle() {
        if(drumPlaying) drumStop(); else drumStart();
    }

    // Return the AudioContext time of the next drum step boundary (for SYNC)
    function nextDrumBoundary() {
        if(!drumPlaying || !audioCtx) return 0;
        return drumNextTime;
    }

    function pressNote(n, chordHue) {
        if(!n||n.pressed) return;
        if(syncEnabled && drumPlaying && audioCtx) {
            // Delay the orb fire until next drum step boundary
            const now = audioCtx.currentTime;
            const nextBoundary = nextDrumBoundary();
            const delayMs = Math.max(0, (nextBoundary - now) * 1000);
            n.pressed = true;
            setTimeout(()=>{
                fireOrb(n, chordHue);
                setTimeout(()=>{n.pressed=false;}, 180);
            }, delayMs);
        } else {
            n.pressed=true; fireOrb(n, chordHue);
            setTimeout(()=>{n.pressed=false;},180);
        }
    }

    function handleInput(x,y) {
        // Tab switching — large tabs floating above keyboard panel
        const tabW=120, tabH=44, tabX=8, tabY=sceneH-tabH;
        if(y>=tabY && y<=tabY+tabH) {
            if(x>=tabX        && x<=tabX+tabW)       { currentTab='sound';  return; }
            if(x>=tabX+tabW+4 && x<=tabX+tabW*2+4)   { currentTab='rhythm'; return; }
            // First Try portal — navigate to v1
            const ftW=118, ftX=W-ftW-8;
            if(x>=ftX && x<=ftX+ftW) { window.location.href='dream-train-v1.html'; return; }
        }
        if(currentTab === 'rhythm') {
            if(!drumBounds.ky) calcDrumBounds();
            // Play/pause
            const pb = drumBounds.playBtn;
            if(x>=pb.x&&x<=pb.x+pb.w&&y>=pb.y&&y<=pb.y+pb.h){
                if(!audioCtx) initAudio();
                drumToggle(); return;
            }
            // BPM up
            const bu=drumBounds.bpmUp;
            if(x>=bu.x&&x<=bu.x+bu.w&&y>=bu.y&&y<=bu.y+bu.h){
                drumBPM=Math.min(200,drumBPM+1); return;
            }
            // BPM down
            const bd=drumBounds.bpmDown;
            if(x>=bd.x&&x<=bd.x+bd.w&&y>=bd.y&&y<=bd.y+bd.h){
                drumBPM=Math.max(40,drumBPM-1); return;
            }
            // Sync toggle
            const sb=drumBounds.syncBtn;
            if(x>=sb.x&&x<=sb.x+sb.w&&y>=sb.y&&y<=sb.y+sb.h){
                syncEnabled=!syncEnabled; return;
            }
            // Auto-drum button
            const adb=drumBounds.autoDrumBtn;
            if(adb&&x>=adb.x&&x<=adb.x+adb.w&&y>=adb.y&&y<=adb.y+adb.h){
                autoDrum=!autoDrum;
                if(autoDrum){
                    generateAutoDrumPattern();
                    autoDrumPrevBar=-1;
                    if(!audioCtx) initAudio();
                    if(!drumPlaying) drumStart();
                }
                return;
            }
            // OTT / NORMAL toggle
            const ob=drumBounds.ottBtn;
            if(ob&&x>=ob.x&&x<=ob.x+ob.w&&y>=ob.y&&y<=ob.y+ob.h){
                ottMode=!ottMode; return;
            }
            // Sidechain knob — start drag
            const sk=drumBounds.scKnob;
            if(Math.hypot(x-sk.cx,y-sk.cy)<=sk.r+8){
                scDragging=true; scDragStartY=y; scDragStartVal=sidechainAmt; return;
            }
            // Grid cell toggle
            for(let r=0;r<5;r++){
                for(let s=0;s<DRUM_STEPS;s++){
                    const c=drumBounds.cells[r][s];
                    if(x>=c.x&&x<=c.x+c.w&&y>=c.y&&y<=c.y+c.h){
                        drumPattern[r][s]=!drumPattern[r][s]; return;
                    }
                }
            }
            return; // consume all rhythm-tab touches
        }
        // Auto-melody button
        if(autoMelBounds.w>0){
            const ab=autoMelBounds;
            if(x>=ab.x&&x<=ab.x+ab.w&&y>=ab.y&&y<=ab.y+ab.h){
                autoMelody=!autoMelody;
                if(autoMelody){
                    if(!audioCtx) initAudio();
                    startAutoMelody();
                } else {
                    stopAutoMelody();
                }
                return;
            }
        }
        const n=noteAt(x,y);
        if(n){pressNote(n);return;}
        const ch=chordAt(x,y);
        if(ch){fireChord(ch);return;}
        const pv=pivotAt(x,y);
        if(pv){firePivot(pv);return;}
        const ks=spinnerHit(keySelBounds,x,y);
        if(ks==='up')   { changeKey(-1);     return; }
        if(ks==='down') { changeKey(1);      return; }
        const ms=spinnerHit(modeSelBounds,x,y);
        if(ms==='up')   { changeMode(-1);    return; }
        if(ms==='down') { changeMode(1);     return; }
        // Octave toggle: left 35% = down, right 35% = up
        if(octaveBounds.w > 0) {
            const ob = octaveBounds;
            if(x>=ob.x && x<=ob.x+ob.w && y>=ob.y && y<=ob.y+ob.h) {
                if(x < ob.x + ob.w * 0.35)      changeOctave(-1);
                else if(x > ob.x + ob.w * 0.65) changeOctave(1);
                return;
            }
        }
        const ss=spinnerHit(soundSelBounds,x,y);
        if(ss==='up')   { changePreset(-1);  return; }
        if(ss==='down') { changePreset(1);   return; }
        // BED selector
        const bs = spinnerHit(bedBounds, x, y);
        if(bs === 'up')     { changeBed(-1);  return; }
        if(bs === 'down')   { changeBed(1);   return; }
        if(bs === 'middle') { toggleBed();    return; }
    }

    canvas.addEventListener('mousedown',e=>{
        const r=canvas.getBoundingClientRect();
        handleInput(e.clientX-r.left, e.clientY-r.top);
    });
    canvas.addEventListener('touchstart',e=>{
        e.preventDefault();
        const r=canvas.getBoundingClientRect();
        for(const t of e.changedTouches) handleInput(t.clientX-r.left, t.clientY-r.top);
    },{passive:false});

    canvas.addEventListener('mousemove',e=>{
        if(!scDragging) return;
        const r=canvas.getBoundingClientRect();
        const dy = scDragStartY - (e.clientY - r.top);
        sidechainAmt = Math.max(0, Math.min(1, scDragStartVal + dy/80));
    });
    canvas.addEventListener('mouseup',()=>{ scDragging=false; });
    canvas.addEventListener('touchmove',e=>{
        if(!scDragging) return;
        e.preventDefault();
        const r=canvas.getBoundingClientRect();
        const dy = scDragStartY - (e.changedTouches[0].clientY - r.top);
        sidechainAmt = Math.max(0, Math.min(1, scDragStartVal + dy/80));
    },{passive:false});
    canvas.addEventListener('touchend',()=>{ scDragging=false; });

    const kmap={'a':0,'w':1,'s':2,'e':3,'d':4,'f':5,'t':6,'g':7,'y':8,'h':9,'u':10,'j':11,
        'k':12,'o':13,'l':14,'p':15,';':16,"'":17};
    const held=new Set();
    document.addEventListener('keydown',e=>{
        if(e.key===' '){ e.preventDefault(); if(!audioCtx)initAudio(); drumToggle(); return; }
        if(e.key==='ArrowUp')    { e.preventDefault(); changePreset(-1);  return; }
        if(e.key==='ArrowDown')  { e.preventDefault(); changePreset(1);   return; }
        if(e.key==='ArrowLeft')  { e.preventDefault(); changeOctave(-1);  return; }
        if(e.key==='ArrowRight') { e.preventDefault(); changeOctave(1);   return; }
        if(e.repeat||held.has(e.key))return;
        const idx=kmap[e.key.toLowerCase()];
        if(idx!==undefined&&idx<notes.length){held.add(e.key);pressNote(notes[idx]);}
    });
    document.addEventListener('keyup',e=>held.delete(e.key));

    // ─── Start ───
    overlay.addEventListener('click',()=>{
        initAudio(); overlay.style.opacity='0';
        setTimeout(()=>overlay.style.display='none',600);
        setTimeout(()=>preloadAllBeds(), 800); // pre-cache bed recordings in background
    });
    // When the tab goes to background, expand drum lookahead so the scheduler
    // pre-fills several seconds of steps — surviving Chrome's 1s timer throttling.
    document.addEventListener('visibilitychange', () => {
        if(document.hidden) {
            drumLookahead = DRUM_LOOKAHEAD_HIDDEN;
            drumSchedule(); // pre-fill immediately before throttling kicks in
        } else {
            drumLookahead = DRUM_LOOKAHEAD_NORMAL;
        }
    });

    window.addEventListener('resize',layout);
    layout();
    lastT=performance.now();
    requestAnimationFrame(frame);
})();
</script>
</body>
</html>
