            case 3: // tall diamond
                ctx.moveTo(0,-sz*1.5); ctx.lineTo(sz*0.75,0); ctx.lineTo(0,sz*1.5); ctx.lineTo(-sz*0.75,0); ctx.closePath(); break;
            case 4: // pentagon
                for(let k=0;k<5;k++){const a=k/5*Math.PI*2-Math.PI/2;k===0?ctx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);} ctx.closePath(); break;
            case 5: // hexagon
                for(let k=0;k<6;k++){const a=k/6*Math.PI*2;k===0?ctx.moveTo(Math.cos(a)*sz,Math.sin(a)*sz):ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);} ctx.closePath(); break;
            case 6: // 5-pointed star
                for(let k=0;k<10;k++){const a=k/10*Math.PI*2-Math.PI/2;const r=k%2===0?sz:sz*0.42;k===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);} ctx.closePath(); break;
            case 7: // cross — lines only, no fill
                ctx.moveTo(0,-sz*1.2); ctx.lineTo(0,sz*1.2);
                ctx.moveTo(-sz*1.2,0); ctx.lineTo(sz*1.2,0); break;
            case 8: // circle
                ctx.arc(0, 0, sz, 0, Math.PI*2); break;
        }
        // Soft fill pass (not on cross which can't be filled meaningfully)
        if(si !== 7) {
            ctx.globalAlpha = alpha * 0.18;
            ctx.fillStyle = strokeColor;
            ctx.fill();
        }
        // Crisp stroke outline
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = strokeColor;
        ctx.lineWidth = 1.0 + sz * 0.07;
        ctx.stroke();
        ctx.restore();
    }

    // Draw the outline path for the current orb shape (used for both glow + crisp passes)
    // All shapes rotate to follow their travel direction via ctx transform.
    function pathOrbShape(cx, cy, cr, shape, angle) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle || 0);
        ctx.beginPath();
        switch(shape) {
            case 'triangle': {
                // Tip points along +x (travel direction), wings sweep back
                const h = cr * 1.2;
                ctx.moveTo(h, 0);
                ctx.lineTo(-h * 0.72, -h * 0.88);
                ctx.lineTo(-h * 0.72,  h * 0.88);
                ctx.closePath();
                break;
            }
            case 'octagon':
                for(let k = 0; k < 8; k++) {
                    const a = k / 8 * Math.PI * 2 + Math.PI / 8;
                    k === 0 ? ctx.moveTo(Math.cos(a)*cr, Math.sin(a)*cr)
                            : ctx.lineTo(Math.cos(a)*cr, Math.sin(a)*cr);
                }
                ctx.closePath();
                break;
            case 'square': {
                // Diamond orientation — corners point along/against travel
                const s = cr * 0.92;
                ctx.moveTo(s, 0); ctx.lineTo(0, s);
                ctx.lineTo(-s, 0); ctx.lineTo(0, -s);
                ctx.closePath();
                break;
            }
            case 'chevron': {
                // Tip points along +x (travel direction)
                ctx.moveTo(cr*1.15, 0);
                ctx.lineTo(-cr*0.55, -cr*0.88);
                ctx.lineTo(-cr*0.1,  0);
                ctx.lineTo(-cr*0.55,  cr*0.88);
                ctx.closePath();
                break;
            }
            default: // circle — rotation doesn't change appearance
                ctx.arc(0, 0, cr, 0, Math.PI * 2);
        }
        ctx.restore();
    }

    // Orbs — clean circles with elaborate comet tails
